<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Quiz Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="auth-card">
      <p class="auth-kicker">Quiz Access</p>
      <h1>Create Account</h1>
      <p class="auth-subtext">Register a new user for the quiz portal.</p>

      <form id="register-form" novalidate>
        <label>
          Full Name
          <input
            type="text"
            id="fullName"
            name="fullName"
            autocomplete="name"
            minlength="2"
            placeholder="Enter your full name"
            required
          />
        </label>
        <label>
          Username
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            minlength="3"
            maxlength="24"
            pattern="[A-Za-z0-9._-]+"
            placeholder="3-24 chars (letters, numbers, . _ -)"
            required
          />
        </label>
        <label>
          Email
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </label>
        <label>
          Password
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            minlength="6"
            placeholder="At least 6 characters"
            required
          />
        </label>
        <label>
          Confirm Password
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            autocomplete="new-password"
            minlength="6"
            placeholder="Re-enter password"
            required
          />
        </label>
        <p class="msg" id="register-message"></p>
        <button type="submit">Register</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </main>

    <script src="auth.js"></script>
    <script src="register.js"></script>
  </body>
</html>
